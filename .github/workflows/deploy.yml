name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  build-and-test:
    name: Build & test
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Clean up previous run
        run: |
          echo "DB_USER=todo_user" > .env
          echo "DB_PASSWORD=todo_password" >> .env
          echo "DB_NAME=todo_db" >> .env
          docker compose -f docker-compose.yml -f docker-compose.ci.yml down -v --remove-orphans 2>/dev/null || true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install backend dependencies
        working-directory: backend
        run: npm install

      - name: Type-check backend
        working-directory: backend
        run: npx tsc --noEmit

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Type-check frontend
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Build frontend
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000
        run: npm run build

      - name: Build Docker images
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml build

      - name: Start services
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d
          sleep 15

      - name: Show running containers
        run: docker ps

      - name: Health check — backend
        run: docker exec todo_backend wget -qO- --tries=5 http://localhost:4000/health

      - name: Health check — frontend
        run: docker exec todo_frontend wget -qO- --tries=5 http://localhost:3000

      - name: API smoke test — list tasks
        run: docker exec todo_backend wget -qO- http://localhost:4000/api/tasks

      - name: Tear down
        if: always()
        run: |
          echo "DB_USER=todo_user" > .env
          echo "DB_PASSWORD=todo_password" >> .env
          echo "DB_NAME=todo_db" >> .env
          docker compose -f docker-compose.yml -f docker-compose.ci.yml down -v --remove-orphans

  push-images:
    name: Push images to registry
    runs-on: self-hosted
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata — backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/todo-backend
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Extract metadata — frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/todo-frontend
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build & push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}

      - name: Build & push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}

  deploy:
    name: Deploy
    runs-on: self-hosted
    needs: [build-and-test, push-images]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env file
        run: |
          echo "DB_USER=todo_user" > .env
          echo "DB_PASSWORD=todo_password" >> .env
          echo "DB_NAME=todo_db" >> .env

      - name: Stop existing containers
        run: docker compose down --remove-orphans 2>/dev/null || true

      - name: Start containers
        run: docker compose up -d --build

      - name: Verify running
        run: |
          sleep 10
          curl --fail http://localhost:3000/
          echo "App is live at http://10.0.32.115:3000"